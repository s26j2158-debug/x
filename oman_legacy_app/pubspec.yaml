name: oman_legacy_app
description: "Oman Legacy Tourism Application"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.6.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  supabase_flutter: ^2.5.6

  firebase_core: ^3.13.0
  firebase_auth: ^5.5.2
  firebase_auth_web: ^5.1.1
  cloud_firestore: ^5.0.3
  firebase_core_web: ^2.11.0
  firebase_storage: ^12.0.4
  firebase_messaging: ^15.0.2

  # Login
  google_sign_in: ^6.1.5

  # State Management
  provider: ^6.1.2

  # Maps (بديل مجاني)
  flutter_map: ^6.1.0
  latlong2: ^0.9.0

  # Other
  intl: ^0.19.0
  flutter_spinkit: ^5.2.0
  shared_preferences: ^2.2.2
  in_app_review: ^2.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - images/